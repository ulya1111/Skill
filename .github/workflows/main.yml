name: CI/CD Pipeline

on:
  push:
    branches:
      - master
    tags:
      - '*'
      - 'release.*'

jobs:
  install_env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run install env script
        run: echo "test 1 -----------------------------------------"

  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run tests script
        run: echo "test 2 -----------------------------------------"

  linters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run linter script
        run: echo "test linter-------------------------------------"
      # Пример запуска и проверки index.html
      - name: Check if index.html exists
        run: |
          if [ -f "index.html" ]; then
            echo "index.html найден, файл готов к сборке."
          else
            echo "Ошибка: index.html не найден!" && exit 1
          fi

  build:
    needs: [install_env, run_tests, linters]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run build script
        run: |
          chmod +x ./build.sh
          ./build.sh

  tests_after_build:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run tests after build
        run: echo "test after build 1 ---------------------------------"

  deploy_dev:
    needs: tests_after_build
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run deploy dev script
        run: |
          chmod +x ./build.sh
          ./build.sh

  deploy_stage:
    needs: tests_after_build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run deploy stage script
        run: |
          chmod +x ./build.sh
          ./build.sh
